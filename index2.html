<!DOCTYPE html>
<html>
<head>
    <title>Menu Cemilan</title>
    <style>
        body { font-family: Arial; text-align: center; }

        .card {
            display: inline-block;
            width: 200px;
            margin: 10px;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
        }

        button {
            margin-top: 10px;
            padding: 8px 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        #keranjang {
            margin-top: 30px;
            padding: 15px;
            background: #f1f2f6;
            border-radius: 10px;
            width: 300px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>

<h1>Daftar Menu Cemilan</h1>
<p>dapurcemilan.ofc</p>

<div class="card">
    <img src="dimsum.jpg">
    <h3>Dimsum Ori</h3>
    <p>Rp10.000</p>
    <button onclick="pesan('Dimsum Ori')">Pesan</button>
</div>

<div class="card">
    <img src="tahu_walek.jpg">
    <h3>Tahu Walek</h3>
    <p>Rp10.000</p>
    <button onclick="pesan('Tahu Walek')">Pesan</button>
</div>

<div class="card">
    <img src="tahu_toping.jpg">
    <h3>Tahu Toping</h3>
    <p>Rp10.000</p>
    <button onclick="pesan('Tahu Toping')">Pesan</button>
</div>

<div class="card">
    <img src="sostel.jpg">
    <h3>Sostel</h3>
    <p>Rp5.000</p>
    <button onclick="pesan('Sostel')">Pesan</button>
</div>

<div class="card">
    <img src="dimsum_cake.jpg">
    <h3>Dimsum Cake</h3>
    <p>Rp85.000-100.000</p>
    <button onclick="pesan('Dimsum Cake')">Pesan</button>
</div>

<div id="keranjang">
    <h3>Keranjang Kosong</h3>
</div>

<script>
let keranjang = {};

function pesan(nama) {
    if (keranjang[nama]) {
        keranjang[nama]++;
    } else {
        keranjang[nama] = 1;
    }
    tampilkanKeranjang();
}

function tampilkanKeranjang() {
    let hasil = "<h3>Keranjang:</h3>";

    for (let item in keranjang) {
        hasil += item + " (" + keranjang[item] + ")<br>";
    }

    document.getElementById("keranjang").innerHTML = hasil;
}
</script>

</body>
</html>
